<!DOCTYPE html>
<html lang="ru">

<head>

  <link rel="stylesheet" href="style.css">
</head>

<body>


  <header class="main-header">
    <div class="header-container">
      <!-- Сюда прилетит брусок -->

      <nav class="main-nav">
        <ul class="menu-list">
            <div class="nav-group-left">

            <div class="nav-center-gap" style="width: 124px;"></div>
    
            <div class="nav-group-right">
                <a href="#" class="nav-link">About</a>
                <a href="#" class="nav-link">Contact</a>
            </div>
        </ul>
    </nav>
    </div>
  </header>
  <div class="slider" id="mainSlider">
    <!-- Слайд 1 -->
    <section class="slide" id="slide-1">
      <div class="image-container"><img src="pexels-alex-kad-4046993.jpg" alt="" ></div>
      <div class="cube-viewport">
        <div class="cube" id="hero-cube">
          <div class="side side--1 front active-side">
            <h2>NIKO</h2>
          </div> <!-- 0° -->
          <div class="side side--2 top">
            <h2>Architecture</h2>
          </div> <!-- -90° -->

            <h2>NIKO</h2>
          </div> <!-- -180° -->
          <div class="side side--4 bottom">
            <h2>Digital</h2>
          </div> <!-- -270° -->

    </section>

      <div class="image-container"><img src="pexels-cripsdog-4461192.jpg" alt="" ></div>

        <h2 class="reveal-text">Architecture</h2>
      </div>
    </section>

    <!-- Слайд 3 -->
    <section class="slide" id="slide-3">
      <div class="image-container"><img src="pexels-alfred-franz-114875410-30937701.jpg" alt="" ></div>
      <div class="slide-content">
        <h2 class="reveal-text">Digital</h2>
      </div>

    <section class="slide" id="slide-4">

      </div>
      <div class="slide-content">
        <h2 class="reveal-text">Design</h2>
      </div>
    </section>

    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-8">
